<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .gradient-bg { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">
    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-lg relative">
        
        <header class="gradient-bg text-white p-6 rounded-b-3xl shadow-md">
            <h1 class="text-2xl font-bold">Field-Sync v1.0</h1>
            <p class="text-blue-200 text-sm">Industrial Task Management</p>
        </header>

        <div id="login-screen" class="p-6 space-y-4">
            <h2 class="text-xl font-semibold text-gray-700">Employee Login</h2>
            <input id="login-id" type="text" placeholder="Employee ID" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <input id="login-mobile" type="tel" placeholder="Mobile Number" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="verifyUser()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">LOGIN</button>
        </div>

        <div id="dashboard" class="hidden p-6 space-y-6">
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                <p class="text-gray-500 text-sm">Welcome back,</p>
                <h2 id="user-display" class="text-2xl font-bold text-blue-900">User Name</h2>
            </div>

            <div id="task-form" class="space-y-4">
                <input id="ticket-no" type="text" placeholder="Ticket/Work Order #" class="w-full p-3 border rounded-lg">
                <select id="task-type" class="w-full p-3 border rounded-lg bg-white">
                    <option value="">Select Task Type</option>
                    <option value="Maintenance">Maintenance</option>
                    <option value="Installation">Installation</option>
                    <option value="Survey">Survey</option>
                </select>
                <button id="timer-btn" onclick="toggleTask()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg text-lg">START TASK</button>
            </div>

            <div id="active-timer" class="hidden text-center p-6 bg-gray-900 rounded-2xl text-white">
                <p class="text-gray-400 uppercase text-xs tracking-widest">Active Session</p>
                <div id="timer-display" class="text-4xl font-mono my-2">00:00:00</div>
                <button onclick="stopTask()" class="mt-4 bg-red-500 px-6 py-2 rounded-full text-sm font-bold">STOP & SUBMIT</button>
            </div>
        </div>
    </div>

    <script>
        // PASTE YOUR GOOGLE WEB APP URL HERE
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby0Qv4lv8xh4panUx7omTTjJ_1r45bgXgo3PbCsovFnk1_TvJgIeqrC5GSRIGxfDI9x/exec"; 
        
        let currentUser = null;
        let startTime = null;
        let timerInterval = null;

        async function verifyUser() {
            const empId = document.getElementById('login-id').value;
            const mobile = document.getElementById('login-mobile').value;
            
            // For 100+ employees, we fetch from the Sheet
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'verifyEmployee', empId, mobile })
            });
            const result = await response.json();

            if (result.status === 'found') {
                currentUser = { id: empId, name: result.name, mobile: mobile };
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('user-display').innerText = result.name;
            } else {
                alert("Employee record not found!");
            }
        }

        function toggleTask() {
            const ticket = document.getElementById('ticket-no').value;
            if(!ticket) return alert("Enter Ticket No");
            
            startTime = new Date();
            document.getElementById('task-form').classList.add('hidden');
            document.getElementById('active-timer').classList.remove('hidden');
            
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            const now = new Date();
            const diff = new Date(now - startTime);
            const h = String(diff.getUTCHours()).padStart(2, '0');
            const m = String(diff.getUTCMinutes()).padStart(2, '0');
            const s = String(diff.getUTCSeconds()).padStart(2, '0');
            document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
        }

        async function stopTask() {
            const endTime = new Date();
            const duration = Math.round((endTime - startTime) / 60000); // in minutes
            
            const payload = {
                action: 'logTask',
                empId: currentUser.id,
                name: currentUser.name,
                ticketNo: document.getElementById('ticket-no').value,
                taskType: document.getElementById('task-type').value,
                location: "GPS Disabled (Demo)", // Can add Geolocation API here
                startTime: startTime.toLocaleTimeString(),
                endTime: endTime.toLocaleTimeString(),
                duration: duration,
                outcome: "Completed"
            };

            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            
            clearInterval(timerInterval);
            alert("Task logged successfully!");
            location.reload(); // Reset UI
        }
    </script>
</body>
</html>
